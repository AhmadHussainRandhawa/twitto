{% extends "layout.html" %}
{% block title %}Twitto{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mt-4 mb-3">
    <h2 class="text-light">Latest Tweets</h2>
    <a class="btn btn-primary" href="{% url 'tweetCreate' %}">+ New Tweet</a>
</div>

<div class="container">
    <div class="row g-3">
        {% for tweet in tweets %}
            <div class="col-sm-12 col-md-6 col-lg-4">
                <div class="card bg-dark text-light shadow rounded-3 h-100">
                    {% if tweet.image %}
                        <figure class="m-0">
                            <img
                                src="{{ tweet.image.url }}"
                                class="card-img-top rounded-top tweet-image"
                                alt="{{ tweet.user.username }}'s tweet image"
                                loading="lazy"
                            >
                        </figure>
                    {% endif %}
                    <div class="card-body d-flex flex-column">
                        <h4 class="card-title mb-1">{{ tweet.user.username }}</h4>
                        <p class="card-text tweet-text mb-2">{{ tweet.text }}</p>

                        <div class="mt-auto">
                            {% if tweet.user == user %}
                                <a href="{% url 'tweetEdit' tweet.id %}" class="btn btn-outline-info btn-sm me-2">Edit</a>
                                <a href="{% url 'tweetDelete' tweet.id %}" class="btn btn-outline-danger btn-sm">Delete</a>
                            {% endif %}
                        </div>
                    </div>
                </div>    
            </div> 
        {% endfor %}
    </div>
</div>

{% endblock %}
